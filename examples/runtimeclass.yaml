# The RuntimeClass that routes a Pod to the imageless runtime handler.
# `handler` must equal the runtime key in containerd's config.toml.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: imageless
handler: imageless
scheduling:
  # Apply this stable capability label only after the resolver, imageless-runc,
  # and containerd handler are installed and healthy on the node.
  nodeSelector:
    imageless.run/runtime: v2
